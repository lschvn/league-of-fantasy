services:
  app:
    container_name: fantasy_app
    build:
        context: ./
        dockerfile: app.dockerfile
    working_dir: /var/www
    environment:
        APP_URL: "http://localhost:${APP_PORT:-8080}"
    volumes:
        - ./:/var/www
    depends_on:
        - "db"
    networks:
        - db
  web:
    container_name: fantasy_web
    build:
        context: .
        dockerfile: web.dockerfile
    working_dir: /var/www
    volumes:
        - ./:/var/www
    depends_on:
        - "app"
    ports:
        - "${APP_PORT:-8080}:80"
    networks:
        - db
  db:
    container_name: fantasy_db
    image: postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /data/postgres
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - db:/data/postgres
    ports:
      - "${DB_PORT}:5432"
    networks:
      - db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d postgres" ]
      interval: 30s
      timeout: 10s
      retries: 5
  composer:
    image: composer:2
    working_dir: /var/www
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    volumes:
      - ./:/var/www
  node:
    image: node:22
    working_dir: /var/www
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    volumes:
      - ./:/var/www
networks:
  db:
    driver: bridge

volumes:
  db:
